<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hacker News RSS Ticker</title>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:400,600&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { 
    background:#000; 
    font-family:"Open Sans", sans-serif; 
    overflow:hidden; 
}
.ticker { 
    height:19px; 
    display:flex; 
    align-items:center; 
    overflow:hidden; 
}
.track { 
    display:flex; 
    white-space:nowrap; 
    will-change:transform; 
}
.item { 
    display:flex; 
    align-items:center; 
    color:#fff; 
    font-size:10px;
    margin-right:30px;
}
.item a { 
    color:#fff; 
    text-decoration:none; 
}
.item a:hover { 
    filter:brightness(0.75);
}
.divider { 
    width:1px; 
    height:100%; 
    background:#fff; 
    margin:0 10px; 
}
.meta { 
    display:flex; 
    align-items:center; 
    font-size:14px; 
    white-space:nowrap;
}
.dot { 
    width:2px; 
    height:2px; 
    background:#fff; 
    border-radius:50%; 
    margin:0 9px; 
}
</style>
</head>
<body>
<div class="ticker">
    <div class="track" id="track"></div>
</div>

<script>
class HNNewsTicker {
    constructor() {
        this.feed = [];
        this.x = 0;
        this.speed = 0.4;
        this.running = false;
        this.init();
    }

    async init() {
        await this.fetchNews();
        setInterval(() => this.fetchNews(), 300000); 
    }

    async fetchNews() {
        try {
            const res = await fetch("https://hn.algolia.com/api/v1/search?tags=front_page");
            const data = await res.json();
            this.feed = data.hits.map(item => ({
                title: (item.title || "No title").substring(0,100),
                link: item.url || `https://news.ycombinator.com/item?id=${item.objectID}`,
                label: "HN",
                date: new Date(item.created_at),
                time: this.timeAgo(new Date(item.created_at))
            }));
            this.render(this.feed);
        } catch(e) {
            console.error("Failed to fetch HN news", e);
        }
    }

    timeAgo(date) {
        const s = (Date.now() - date.getTime())/1000;
        if(s < 3600) return Math.max(1,Math.floor(s/60)) + "m";
        if(s < 86400) return Math.floor(s/3600) + "h";
        return Math.floor(s/86400) + "d";
    }

    render(data) {
        const track = document.getElementById("track");
        track.innerHTML = "";
        const items = [...data, ...data]; 

        items.forEach(item => {
            const el = document.createElement("div");
            el.className = "item";
            el.innerHTML = `
                <a href="${item.link}" target="_blank">${item.title}</a>
                <span class="divider"></span>
                <div class="meta">
                    <span>${item.label}</span>
                    <span class="dot"></span>
                    <span>${item.time}</span>
                </div>
            `;
            track.appendChild(el);
        });

        this.totalWidth = track.scrollWidth;
        this.x = 0;
        if(!this.running) {
            this.running = true;
            this.loop();
        }
    }

    loop() {
        if(!this.running) return;
        this.x -= this.speed;
        if(this.x <= -this.totalWidth / 2) this.x = 0;
        document.getElementById("track").style.transform = `translateX(${this.x}px)`;
        requestAnimationFrame(() => this.loop());
    }
}

document.addEventListener("DOMContentLoaded", () => new HNNewsTicker());
</script>
</body>
</html>
